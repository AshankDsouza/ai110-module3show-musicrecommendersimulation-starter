services:
  db:
    build:
      context: .
      dockerfile: postgresql/Dockerfile
    container_name: music-recommender-db
    environment:
      POSTGRES_DB: music_recommender
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d music_recommender"]
      interval: 5s
      timeout: 5s
      retries: 10

  load-data:
    build:
      context: .
      dockerfile: postgresql/Dockerfile.loader
    container_name: music-recommender-loader
    environment:
      POSTGRES_URL: host=db port=5432 dbname=music_recommender user=postgres password=postgres
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_URL: host=db port=5432 dbname=music_recommender user=postgres password=postgres
      OPENAI_BASE_URL: http://ollama:11434/v1
      OPENAI_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
      OPENAI_API_KEY: ollama
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: music-recommender-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ollama_data: